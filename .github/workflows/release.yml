name: Build and Release

on:
  push:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ── Build wheel + sdist ──────────────────────────────────────────────
  build-whl:
    name: Build wheel & sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whl-dist
          path: dist/

  # ── Build Windows executable via PyInstaller ─────────────────────────
  build-exe:
    name: Build Windows executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install .

      - name: Build executable
        run: pyinstaller --onefile --name gh-dl gh_downloader/__main__.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-dist
          path: dist/gh-dl.exe

  # ── Upload to GitHub Release ─────────────────────────────────────────
  release:
    name: Upload to GitHub Release
    needs: [build-whl, build-exe]
    runs-on: ubuntu-latest
    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          name: whl-dist
          path: whl-dist

      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: exe-dist
          path: exe-dist

      - name: Set release tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_ENV
          else
            echo "tag=continuous" >> $GITHUB_ENV
          fi

      - name: Create / update release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.tag }}
          name: ${{ env.tag == 'continuous' && format('Continuous Build ({0})', github.sha) || format('Release {0}', env.tag) }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          replacesArtifacts: true
          makeLatest: ${{ env.tag == 'continuous' && 'legacy' || 'true' }}
          artifacts: |
            whl-dist/*.whl
            whl-dist/*.tar.gz
            exe-dist/gh-dl.exe
